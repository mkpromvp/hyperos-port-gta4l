name: Port HyperOS to Galaxy Tab A7

on:
  workflow_dispatch:
    inputs:
      samsung_fw_url:
        description: 'Samsung AP firmware URL (tar.md5)'
        required: false
        default: ''
      hyperos_fw_url:
        description: 'HyperOS firmware URL (.tgz or .zip)'
        required: false
        default: ''
      upload_release:
        description: 'Upload result to GitHub Release'
        type: boolean
        default: false
      gofile_upload:
        description: 'Upload to GoFile.io'
        type: boolean
        default: true

env:
  DEVICE: gta4l
  MODEL: SM-T505N
  HYPEROS_SF_URL: "https://master.dl.sourceforge.net/project/miui-greeshan-repack/HyperOS/Xiaomi-PadSE-xun/greeshan.ru_XiaomiPadSE_xun_V1.0.7.0.UMUMIXM_14.0_7349f.zip?viasf=1"
  HYPEROS_SF_FALLBACK: "https://downloads.sourceforge.net/project/miui-greeshan-repack/HyperOS/Xiaomi-PadSE-xun/greeshan.ru_XiaomiPadSE_xun_V1.0.7.0.UMUMIXM_14.0_7349f.zip"

concurrency:
  group: port-${{ github.ref }}
  cancel-in-progress: true

jobs:
  port:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h
          # Remove unnecessary large packages
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
          sudo apt-get clean 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          rm -rf /home/runner/.cache 2>/dev/null || true
          echo "=== After cleanup ==="
          df -h
          echo "Disk space freed"

      - name: Cleanup previous builds
        run: |
          rm -rf build output fw_* work 2>/dev/null || true
          df -h
          echo "Cleaned up previous build artifacts"

      - name: Setup tools
        run: |
          sudo apt update
          sudo apt install -y lz4 wget unzip tar python3 python3-pip \
            e2fsprogs android-sdk-libsparse-utils aria2
          pip3 install protobuf lz4 --quiet

      - name: Setup pre-built partition tools
        run: |
          chmod +x tools/lpunpack tools/lpmake
          cp tools/lpunpack tools/lpmake /usr/local/bin/
          echo "Pre-built lpunpack/lpmake installed"
          lpunpack --help 2>&1 | head -3 || echo "lpunpack ready"

      - name: Download HyperOS firmware (SourceForge - fast CDN)
        run: |
          mkdir -p fw_hyperos
          
          # SourceForge mirror (fast from GitHub Actions)
          aria2c -x 8 -s 8 --max-connection-per-server=8 --connect-timeout=30 \
            --timeout=600 --retry-wait=5 --max-tries=5 --allow-overwrite=true \
            --dir=fw_hyperos --out=hyperos_fw.zip "${{ env.HYPEROS_SF_URL }}" 2>&1 || {
            echo "Primary SF mirror failed, trying fallback..."
            aria2c -x 8 -s 8 --max-connection-per-server=8 --connect-timeout=30 \
              --timeout=600 --retry-wait=5 --max-tries=5 --allow-overwrite=true \
              --dir=fw_hyperos --out=hyperos_fw.zip "${{ env.HYPEROS_SF_FALLBACK }}" 2>&1
          }
          
          if [ ! -f fw_hyperos/hyperos_fw.zip ]; then
            echo "All HyperOS downloads failed"
            exit 1
          fi
          ls -la fw_hyperos/
          echo "HyperOS firmware downloaded (SourceForge)"

      - name: Download Samsung firmware
        run: |
          mkdir -p fw_samsung
          
          # Download samloader-rs v2.0.0
          echo "Downloading samloader-rs v2.0.0..."
          wget -q "https://github.com/topjohnwu/samloader-rs/releases/download/2.0.0/samloader-v2.0.0-linux-x86_64.tar.xz" -O /tmp/samloader.tar.xz
          tar -xf /tmp/samloader.tar.xz -C /tmp/
          chmod +x /tmp/samloader
          
          echo "Checking firmware version..."
          FW_VER=$(/tmp/samloader check-update -m SM-T505N -r EGY 2>&1 | head -1)
          echo "Firmware version: $FW_VER"
          echo "FW_VER=$FW_VER" >> $GITHUB_ENV
          
          echo "Downloading encrypted firmware..."
          /tmp/samloader download -m SM-T505N -r EGY -d fw_samsung/ 2>&1
          
          ls -la fw_samsung/
      
      - name: Verify and prepare Samsung firmware
        run: |
          cd $GITHUB_WORKSPACE/fw_samsung
          DL_FILE=$(ls *.zip *.enc4 *.tar* 2>/dev/null | head -1)
          echo "Downloaded file: $DL_FILE"
          file "$DL_FILE"
          
          # Check if already a valid tar archive (samloader may decrypt on-the-fly)
          if tar -tf "$DL_FILE" &>/dev/null; then
            echo "File is a valid tar archive"
            mv "$DL_FILE" samsung_ap.tar.md5
          elif unzip -t "$DL_FILE" &>/dev/null; then
            echo "File is a valid zip archive"
            unzip -o "$DL_FILE" -d extracted/
            ls -la extracted/
            # Check contents
            if ls extracted/*.tar.md5 2>/dev/null | head -1; then
              AP_FILE=$(ls extracted/*.tar.md5 | head -1)
              mv "$AP_FILE" samsung_ap.tar.md5
              echo "Found tar.md5 in zip"
            elif ls extracted/*.tar 2>/dev/null | head -1; then
              AP_FILE=$(ls extracted/*.tar | head -1)
              mv "$AP_FILE" samsung_ap.tar.md5
              echo "Found tar in zip"
            elif ls extracted/*.enc4 2>/dev/null | head -1; then
              echo "Found encrypted .enc4 files, need decryption"
              cp extracted/*.enc4 . 2>/dev/null || true
              pip3 install pycryptodome requests -q 2>&1 | tail -1
              python3 ../scripts/decrypt_samsung.py
            else
              echo "Unknown contents in zip"
              ls -la extracted/
              exit 1
            fi
          elif [[ "$DL_FILE" == *.enc4 ]]; then
            echo "File is .enc4, decrypting directly..."
            pip3 install pycryptodome requests -q 2>&1 | tail -1
            python3 ../scripts/decrypt_samsung.py
          else
            echo "Unknown file format, trying decryption..."
            pip3 install pycryptodome requests -q 2>&1 | tail -1
            python3 ../scripts/decrypt_samsung.py
          fi
          
          # If decryption produced files, handle them
          if [ -f decrypted.tar.md5 ] && [ ! -f samsung_ap.tar.md5 ]; then
            mv decrypted.tar.md5 samsung_ap.tar.md5
          fi
          
          # If decryption produced a zip, extract it
          if [ -f decrypted.zip ] && [ ! -f samsung_ap.tar.md5 ]; then
            echo "Decryption produced a zip file, extracting..."
            unzip -o decrypted.zip -d extracted_dec/
            AP_FILE=$(ls extracted_dec/*.tar.md5 extracted_dec/*.tar 2>/dev/null | head -1)
            if [ -n "$AP_FILE" ]; then
              mv "$AP_FILE" samsung_ap.tar.md5
            fi
          fi
          
          # Check if we have a tar file from somewhere
          if [ -z "$(ls *.tar.md5 *.tar 2>/dev/null)" ]; then
            # Maybe the unzipped dir already has images
            if [ -d extracted ] && ls extracted/*.img* 2>/dev/null | head -1; then
              echo "Found image files directly in zip - using as directory firmware"
              cd ..
              echo "Samsung firmware ready as directory with images"
              exit 0
            fi
          fi
          
          # Final check
          if [ -f samsung_ap.tar.md5 ]; then
            echo "Samsung AP firmware ready: $(stat -c '%s' samsung_ap.tar.md5) bytes"
            file samsung_ap.tar.md5
          else
            echo "ERROR: Could not prepare Samsung firmware."
            ls -la
            exit 1
          fi
          cd ..

      - name: Extract and analyze firmware
        run: |
          # Check what we have
          echo "=== Samsung firmware ==="
          ls -la fw_samsung/ 2>/dev/null || echo "No Samsung fw"
          echo "=== HyperOS firmware ==="
          ls -la fw_hyperos/ 2>/dev/null || echo "No HyperOS fw"

          # Create working directory
          mkdir -p work/samsung work/hyperos

      - name: Delete firmware zips to save space
        run: |
          echo "=== Disk before cleanup ==="
          df -h
          # Remove downloaded zips - they're extracted now
          rm -f fw_hyperos/hyperos_fw.zip 2>/dev/null || true
          rm -f fw_samsung/samsung_ap.tar.md5 2>/dev/null || true
          rm -f fw_samsung/samsung_fw.zip 2>/dev/null || true
          rm -rf fw_samsung/extracted 2>/dev/null || true
          echo "=== Disk after zip cleanup ==="
          df -h
          echo "Freed ~4GB from firmware zips"

      - name: Run porting process
        run: |
          cd $GITHUB_WORKSPACE
          chmod +x scripts/port_hyperos.sh
          
          SAMSUNG_PATH=""
          if [ -f fw_samsung/samsung_ap.tar.md5 ]; then
            SAMSUNG_PATH="fw_samsung/samsung_ap.tar.md5"
          elif [ -d fw_samsung ]; then
            SAMSUNG_PATH="fw_samsung"
          fi
          
          HYPEROS_PATH=""
          if [ -f fw_hyperos/hyperos_fw.zip ]; then
            HYPEROS_PATH="fw_hyperos/hyperos_fw.zip"
          elif [ -d fw_hyperos ]; then
            HYPEROS_PATH="fw_hyperos"
          fi
          
          if [ -z "$SAMSUNG_PATH" ] || [ -z "$HYPEROS_PATH" ]; then
            echo "ERROR: Missing firmware files"
            echo "Samsung: $SAMSUNG_PATH"
            echo "HyperOS: $HYPEROS_PATH"
            exit 1
          fi
          
          bash scripts/port_hyperos.sh "$SAMSUNG_PATH" "$HYPEROS_PATH" ./output

      - name: Upload ported ROM
        uses: actions/upload-artifact@v4
        with:
          name: HyperOS-Port-SM-T505N
          path: ./output/*.tar.md5
          retention-days: 14
          if-no-files-found: warn

      - name: Upload ported super.img (debug)
        uses: actions/upload-artifact@v4
        with:
          name: super_img_debug
          path: ./build/port/super.img
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload to GoFile.io
        if: inputs.gofile_upload == true
        run: |
          set -e
          # Find output files
          OUTPUT_FILES=(./output/*.tar.md5)
          if [ ${#OUTPUT_FILES[@]} -eq 0 ] || [ ! -f "${OUTPUT_FILES[0]}" ]; then
            echo "No output tar.md5 files found, checking for other files..."
            OUTPUT_FILES=(./output/*)
          fi
          
          if [ ${#OUTPUT_FILES[@]} -eq 0 ] || [ ! -f "${OUTPUT_FILES[0]}" ]; then
            echo "No output files found to upload"
            exit 1
          fi
          
          echo "Files to upload: ${OUTPUT_FILES[@]}"
          
          # Get best GoFile server
          SERVER=$(curl -s https://api.gofile.io/servers | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['servers'][0]['name'])" 2>/dev/null || echo "store1")
          echo "GoFile server: $SERVER"
          
          # Upload each file and collect links
          for FILE in "${OUTPUT_FILES[@]}"; do
            echo "Uploading $FILE to GoFile..."
            RESPONSE=$(curl -s -F "file=@$FILE" "https://$SERVER.gofile.io/uploadFile")
            echo "Response: $RESPONSE"
            DOWNLOAD_LINK=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['data']['downloadPage'])" 2>/dev/null || echo "Failed to parse link")
            echo "Download link: $DOWNLOAD_LINK"
            echo "GOFILE_LINK=$DOWNLOAD_LINK" >> $GITHUB_ENV
          done

      - name: Upload to GitHub Release
        if: inputs.upload_release == true
        run: |
          TAG="hyperos-port-$(date +%Y%m%d-%H%M%S)"
          gh release create "$TAG" ./output/*.tar.md5 --title "HyperOS Port ${{ env.MODEL }} $TAG" --notes "Automated HyperOS 1.0.7.0 port for ${{ env.MODEL }} (gta4l)
          
          GoFile download: ${{ env.GOFILE_LINK || 'N/A' }}"
          echo "Release created: $TAG"

      - name: Final cleanup
        if: always()
        run: |
          echo "Cleaning up build files..."
          rm -rf build work fw_* aosp_extras 2>/dev/null || true
          df -h
          echo "Cleanup complete. Only output artifacts remain."

      - name: Show output summary
        run: |
          echo "=== Build Summary ==="
          echo "Device: ${{ env.MODEL }} (${{ env.DEVICE }})"
          echo "Port ROM: Redmi Pad SE (xun) HyperOS 1.0.7.0 (Android 14)"
          echo ""
          if [ -d output ]; then
            echo "Output files:"
            ls -la output/
          fi
          if [ -d build/port ]; then
            echo "Port directory contents:"
            ls -la build/port/
          fi
