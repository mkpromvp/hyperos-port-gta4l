name: Port HyperOS to Galaxy Tab A7

on:
  workflow_dispatch:
    inputs:
      samsung_fw_url:
        description: 'Samsung AP firmware URL (tar.md5)'
        required: false
        default: ''
      hyperos_fw_url:
        description: 'HyperOS firmware URL (.tgz or .zip)'
        required: false
        default: ''
      upload_release:
        description: 'Upload result to GitHub Release'
        type: boolean
        default: false

env:
  DEVICE: gta4l
  MODEL: SM-T505N
  HYPEROS_SF_URL: "https://master.dl.sourceforge.net/project/miui-greeshan-repack/HyperOS/Xiaomi-PadSE-xun/greeshan.ru_XiaomiPadSE_xun_V1.0.7.0.UMUMIXM_14.0_7349f.zip?viasf=1"
  HYPEROS_SF_FALLBACK: "https://downloads.sourceforge.net/project/miui-greeshan-repack/HyperOS/Xiaomi-PadSE-xun/greeshan.ru_XiaomiPadSE_xun_V1.0.7.0.UMUMIXM_14.0_7349f.zip"

jobs:
  port:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup previous builds
        run: |
          rm -rf build output fw_* work 2>/dev/null || true
          df -h
          echo "Cleaned up previous build artifacts"

      - name: Setup tools
        run: |
          sudo apt update
          sudo apt install -y lz4 wget unzip tar python3 python3-pip \
            e2fsprogs android-sdk-libsparse-utils aria2
          pip3 install protobuf lz4 --quiet

      - name: Setup pre-built partition tools
        run: |
          chmod +x tools/lpunpack tools/lpmake
          cp tools/lpunpack tools/lpmake /usr/local/bin/
          echo "Pre-built lpunpack/lpmake installed"
          lpunpack --help 2>&1 | head -3 || echo "lpunpack ready"

      - name: Download HyperOS firmware (SourceForge - fast CDN)
        run: |
          mkdir -p fw_hyperos
          
          # SourceForge mirror (fast from GitHub Actions)
          aria2c -x 8 -s 8 --max-connection-per-server=8 --connect-timeout=30 \
            --timeout=600 --retry-wait=5 --max-tries=5 --allow-overwrite=true \
            --dir=fw_hyperos --out=hyperos_fw.zip "${{ env.HYPEROS_SF_URL }}" 2>&1 || {
            echo "Primary SF mirror failed, trying fallback..."
            aria2c -x 8 -s 8 --max-connection-per-server=8 --connect-timeout=30 \
              --timeout=600 --retry-wait=5 --max-tries=5 --allow-overwrite=true \
              --dir=fw_hyperos --out=hyperos_fw.zip "${{ env.HYPEROS_SF_FALLBACK }}" 2>&1
          }
          
          if [ ! -f fw_hyperos/hyperos_fw.zip ]; then
            echo "All HyperOS downloads failed"
            exit 1
          fi
          ls -la fw_hyperos/
          echo "HyperOS firmware downloaded (SourceForge)"

      - name: Download Samsung firmware
        run: |
          mkdir -p fw_samsung
          
          # Download samloader-rs v2.0.0
          echo "Downloading samloader-rs v2.0.0..."
          wget -q "https://github.com/topjohnwu/samloader-rs/releases/download/2.0.0/samloader-v2.0.0-linux-x86_64.tar.xz" -O /tmp/samloader.tar.xz
          tar -xf /tmp/samloader.tar.xz -C /tmp/
          chmod +x /tmp/samloader
          
          echo "Checking firmware version..."
          FW_VER=$(/tmp/samloader check-update -m SM-T505N -r EGY 2>&1 | head -1)
          echo "Firmware version: $FW_VER"
          
          echo "Downloading encrypted firmware..."
          /tmp/samloader download -m SM-T505N -r EGY -d fw_samsung/ 2>&1
          
          ls -la fw_samsung/
      
      - name: Decrypt Samsung firmware (Python implementation of samloader-rs auth)
        run: |
          pip3 install pycryptodome requests -q 2>&1 | tail -1
          
          python3 << 'PYEOF'
import hashlib, requests, time, re, os
from Crypto.Cipher import AES

# Match samloader-rs auth.rs AUTH_AES_KEY
AUTH_AES_KEY = bytes([0x42, 0x2e, 0x73, 0x73, 0x36, 0x17, 0xae, 0x2b, 0x19, 0x89, 0x40, 0xfd, 0x4e, 0x32, 0xb0, 0xa5])

MODEL = "SM-T505N"
REGION = "EGY"
FW_VER = os.popen("echo $FW_VER").read().strip()
ENC_FILE = ""

for f in os.listdir("fw_samsung"):
    if f.endswith(".zip") or f.endswith(".enc4"):
        ENC_FILE = f"fw_samsung/{f}"
        break

if not ENC_FILE:
    print("NO ENCRYPTED FILE FOUND")
    exit(1)

fw_parts = FW_VER.split("/")
if len(fw_parts) == 3:
    fw_parts.append(fw_parts[0])
FW = "/".join(fw_parts)

# Generate client nonce (same algorithm as auth.rs generate_client_nonce)
def generate_client_nonce():
    seed = int(time.time() * 1_000_000_000) & 0xFFFFFFFFFFFFFFFF
    chars = "abcdefghijklmnopqrstuvwxyz0123456789"
    nonce = ""
    for _ in range(16):
        seed = (seed * 6364136223846793005 + 1442695040888963407) & 0xFFFFFFFFFFFFFFFF
        idx = (seed >> 32) % len(chars)
        nonce += chars[idx]
    return nonce

# Auth computation (same as auth.rs compute_history_headers)
def compute_auth_headers(model):
    client_nonce = generate_client_nonce()
    auth_str = f"auth:{client_nonce}:00000001"
    auth_hash = hashlib.md5(auth_str.encode()).hexdigest()
    interface_str = f"interface:{model.upper()}"
    interface_hash = hashlib.md5(interface_str.encode()).hexdigest()
    final_str = f"{auth_hash}:FUS:{interface_hash}"
    final_sig = hashlib.md5(final_str.encode()).hexdigest()
    auth_val = f'FUS nonce="{client_nonce}", signature="{final_sig}", nc="00000001", type="auth", realm="interface"'
    return auth_val

# Nonce decryption (same as auth.rs decrypt_nonce)
def decrypt_nonce(inp):
    block = bytearray(b'0' * 16)
    b = inp.encode()
    l = min(len(b), 16)
    block[:l] = b[:l]
    cipher = AES.new(AUTH_AES_KEY, AES.MODE_ECB)
    return cipher.encrypt(bytes(block)).hex()

# get_logic_check (same as xml.rs get_logic_check)
def get_logic_check(inp, nonce):
    out = ""
    for c in nonce:
        idx = ord(c) & 0xf
        if idx < len(inp):
            out += inp[idx]
        else:
            out += "."
    return out

sess = requests.Session()
sess.headers.update({"User-Agent": "SMART 2.0"})

# Step 1: Generate nonce (same as NF_SmartDownloadGenerateNonce.do)
print("[*] Authenticating with Samsung FUS (new API)...")
r = sess.post("https://neofussvr.sslcs.cdngc.net/NF_SmartDownloadGenerateNonce.do",
    headers={"Authorization": compute_auth_headers(MODEL)}, data="", timeout=30)
r.raise_for_status()

encnonce = r.headers.get("NONCE") or r.headers.get("nonce") or ""
if not encnonce:
    print("ERROR: No nonce in response")
    exit(1)

auth = decrypt_nonce(encnonce)
auth_header = f'FUS nonce="{encnonce}", signature="{auth}", nc="", type="", realm="", newauth="1"'
print(f"[+] Auth obtained")

# Step 2: Get binary info (NF_SmartDownloadBinaryInform.do)
print("[*] Fetching binary info...")
logic_check = get_logic_check(FW, encnonce)
inform_xml = f"""<FUSMsg>
<FUSHdr><ProtoVer>1.0</ProtoVer><SessionID>0</SessionID><MsgID>1</MsgID></FUSHdr>
<FUSBody>
    <Put>
        <CmdID>1</CmdID>
        <ACCESS_MODE><Data>1</Data></ACCESS_MODE>
        <BINARY_NATURE><Data>1</Data></BINARY_NATURE>
        <REQUEST_TYPE><Data>2</Data></REQUEST_TYPE>
        <LOGIC_CHECK><Data>{logic_check}</Data></LOGIC_CHECK>
        <BINARY_SW_VERSION><Data>{FW}</Data></BINARY_SW_VERSION>
        <BINARY_LOCAL_CODE><Data>{REGION}</Data></BINARY_LOCAL_CODE>
        <BINARY_MODEL_NAME><Data>{MODEL}</Data></BINARY_MODEL_NAME>
    </Put>
    <Get>
        <CmdID>2</CmdID>
        <BINARY_SW_VERSION></BINARY_SW_VERSION>
    </Get>
</FUSBody>
</FUSMsg>"""

r = sess.post("https://neofussvr.sslcs.cdngc.net/NF_SmartDownloadBinaryInform.do",
    headers={"Authorization": auth_header}, data=inform_xml, timeout=30)
r.raise_for_status()

# Parse LOGIC_VALUE_FACTORY from response
logic_val = ""
for m in re.finditer(r'<LOGIC_VALUE_FACTORY[^>]*>(.*?)</LOGIC_VALUE_FACTORY>', r.text, re.DOTALL):
    logic_val = m.group(1).strip()
    break

if not logic_val:
    for m in re.finditer(r'<LOGIC_VALUE_HOME[^>]*>(.*?)</LOGIC_VALUE_HOME>', r.text, re.DOTALL):
        logic_val = m.group(1).strip()
        break

print(f"[+] LOGIC_VALUE: {logic_val}")

# Step 3: Derive decryption key (same as BinaryInform::parse in xml.rs)
key_str = get_logic_check(FW, logic_val)
key = hashlib.md5(key_str.encode()).digest()
print(f"[+] Decryption key: {key.hex()}")

# Step 4: Decrypt the file
file_size = os.path.getsize(ENC_FILE)
print(f"[*] Decrypting {ENC_FILE} ({file_size} bytes)...")

cipher = AES.new(key, AES.MODE_ECB)
out_path = "fw_samsung/samsung_ap.tar.md5"

with open(ENC_FILE, "rb") as f_in, open(out_path, "wb") as f_out:
    remaining = file_size
    while remaining > 0:
        chunk_size = 4096
        if remaining < chunk_size:
            chunk_size = remaining
        chunk = f_in.read(chunk_size)
        if not chunk:
            break
        dec = cipher.decrypt(chunk)
        if remaining <= chunk_size and chunk_size < 4096:
            # Remove PKCS7 padding from last block
            pad_len = dec[-1]
            dec = dec[:-pad_len]
        f_out.write(dec)
        remaining -= chunk_size

print(f"[+] Decrypted to {out_path}")
print(f"    Size: {os.path.getsize(out_path)} bytes")
PYEOF
      
      - name: Verify Samsung AP file
        run: |
          AP_FILE=$(ls fw_samsung/samsung_ap.tar.md5 fw_samsung/AP_*.tar.md5 fw_samsung/*.tar* 2>/dev/null | head -1)
          if [ -n "$AP_FILE" ]; then
            if [ "$AP_FILE" != "fw_samsung/samsung_ap.tar.md5" ]; then
              mv "$AP_FILE" fw_samsung/samsung_ap.tar.md5
            fi
            echo "Samsung AP firmware ready: $(stat -c '%s' fw_samsung/samsung_ap.tar.md5) bytes"
            file fw_samsung/samsung_ap.tar.md5
            ls -la fw_samsung/
          else
            echo "No AP file found."
            ls -la fw_samsung/ 2>/dev/null || echo "Directory empty"
            echo "ERROR: Could not download Samsung firmware."
            exit 1
          fi

      - name: Extract and analyze firmware
        run: |
          # Check what we have
          echo "=== Samsung firmware ==="
          ls -la fw_samsung/ 2>/dev/null || echo "No Samsung fw"
          echo "=== HyperOS firmware ==="
          ls -la fw_hyperos/ 2>/dev/null || echo "No HyperOS fw"

          # Create working directory
          mkdir -p work/samsung work/hyperos

      - name: Run porting process
        run: |
          chmod +x scripts/port_hyperos.sh
          
          SAMSUNG_PATH=""
          if [ -f fw_samsung/samsung_ap.tar.md5 ]; then
            SAMSUNG_PATH="fw_samsung/samsung_ap.tar.md5"
          elif [ -d fw_samsung ]; then
            SAMSUNG_PATH="fw_samsung"
          fi
          
          HYPEROS_PATH=""
          if [ -f fw_hyperos/hyperos_fw.zip ]; then
            HYPEROS_PATH="fw_hyperos/hyperos_fw.zip"
          elif [ -d fw_hyperos ]; then
            HYPEROS_PATH="fw_hyperos"
          fi
          
          if [ -z "$SAMSUNG_PATH" ] || [ -z "$HYPEROS_PATH" ]; then
            echo "ERROR: Missing firmware files"
            echo "Samsung: $SAMSUNG_PATH"
            echo "HyperOS: $HYPEROS_PATH"
            exit 1
          fi
          
          bash scripts/port_hyperos.sh "$SAMSUNG_PATH" "$HYPEROS_PATH" ./output

      - name: Upload ported ROM
        uses: actions/upload-artifact@v4
        with:
          name: HyperOS-Port-SM-T505N
          path: ./output/*.tar.md5
          retention-days: 14
          if-no-files-found: warn

      - name: Upload ported super.img (debug)
        uses: actions/upload-artifact@v4
        with:
          name: super_img_debug
          path: ./build/port/super.img
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload to GitHub Release
        if: inputs.upload_release == true
        run: |
          TAG="hyperos-port-$(date +%Y%m%d-%H%M%S)"
          gh release create "$TAG" ./output/*.tar.md5 --title "HyperOS Port ${{ env.MODEL }} $TAG" --notes "Automated HyperOS 1.0.7.0 port for ${{ env.MODEL }} (gta4l)"
          echo "Release created: $TAG"

      - name: Final cleanup
        if: always()
        run: |
          echo "Cleaning up build files..."
          rm -rf build work fw_* aosp_extras 2>/dev/null || true
          df -h
          echo "Cleanup complete. Only output artifacts remain."

      - name: Show output summary
        run: |
          echo "=== Build Summary ==="
          echo "Device: ${{ env.MODEL }} (${{ env.DEVICE }})"
          echo "Port ROM: Redmi Pad SE (xun) HyperOS 1.0.7.0 (Android 14)"
          echo ""
          if [ -d output ]; then
            echo "Output files:"
            ls -la output/
          fi
          if [ -d build/port ]; then
            echo "Port directory contents:"
            ls -la build/port/
          fi
